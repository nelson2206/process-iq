<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — ProcessIQ</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0E0E10; color: #E9E9EC;
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      text-align: center; padding: 24px;
    }
    .card { max-width: 460px; }
    .mark {
      width: 64px; height: 64px; border-radius: 16px; background: #FF4713;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 700; color: #fff; margin-bottom: 22px;
    }
    .code { font-size: 14px; letter-spacing: 3px; color: #9A9AA2; text-transform: uppercase; }
    h1 { font-size: 26px; margin: 10px 0 8px; font-weight: 700; }
    p { color: #C9C9D0; line-height: 1.5; margin: 0 0 26px; }
    a.btn {
      display: inline-block; background: #FF4713; color: #fff; text-decoration: none;
      padding: 12px 22px; border-radius: 10px; font-weight: 600; font-size: 15px;
      transition: background .15s cubic-bezier(.32,.72,0,1), transform .15s cubic-bezier(.32,.72,0,1);
    }
    a.btn:hover { background: #e23d0f; transform: translateY(-1px); }
    a.btn:active { transform: scale(.97); }
    .sub { margin-top: 14px; font-size: 13px; color: #6F6F77; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">M</div>
    <div class="code">Error 404</div>
    <h1>Página no encontrada</h1>
    <p>La ruta que buscas no existe en ProcessIQ. Vuelve al diagramador de procesos para seguir trabajando.</p>
    <a class="btn" href="./">← Ir a ProcessIQ</a>
    <div class="sub">Minsait · Business Consulting · Perú</div>
  </div>
</body>
</html>
